<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>孩子作业记录</title>
  <link rel="stylesheet" href="style.css?v=20260722-cloud-excel-delete-v19">
  <script src="device-mode.js?v=20260722-cloud-excel-delete-v19"></script>
  <script>
    if (window.AppDeviceMode?.isStudentOnlyDevice) {
      location.replace("children.html");
    }
  </script>
</head>
<body>
  <main class="simple-shell submissions-shell">
    <header class="simple-header">
      <a href="children.html?manage=1" class="back-btn">‹</a>
      <div>
        <h1 id="pageTitle">孩子作业记录</h1>
        <p>查看已经提交的测试，并下载 Excel 表格</p>
      </div>
    </header>

    <section class="panel">
      <div id="loadingState" class="submission-empty">正在同步提交记录…</div>
      <div id="emptyState" class="submission-empty hidden">
        <div class="empty-emoji">📄</div>
        <h2>还没有提交记录</h2>
        <p>孩子完成测试并点击“提交整个 Lesson”后，记录会显示在这里。</p>
      </div>
      <div id="submissionList" class="submission-list hidden"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="account.js?v=20260722-cloud-excel-delete-v19"></script>
  <script src="submission-store.js?v=20260722-cloud-excel-delete-v19"></script>
  <script src="vendor/exceljs.min.js?v=20260722-cloud-excel-delete-v19"></script>
  <script src="report.js?v=20260722-cloud-excel-delete-v19"></script>
  <script>
    (async () => {
      const childId = new URLSearchParams(location.search).get("child") || "";
      const loading = document.getElementById("loadingState");
      const empty = document.getElementById("emptyState");
      const list = document.getElementById("submissionList");

      const children = await loadChildren();
      const child = children.find(item => item.id === childId);
      if (!child) {
        loading.textContent = "找不到这个孩子，请返回“管理孩子”重新选择。";
        return;
      }

      document.getElementById("pageTitle").textContent = `${child.name}的作业记录`;
      const records = await loadChildSubmissions(child.id);
      loading.classList.add("hidden");

      if (!records.length) {
        empty.classList.remove("hidden");
        return;
      }

      list.classList.remove("hidden");
      records.forEach(record => {
        const card = document.createElement("article");
        card.className = "submission-card";

        const copy = document.createElement("div");
        copy.className = "submission-copy";
        const title = document.createElement("strong");
        title.textContent = record.lessonTitle || `Lesson ${record.lessonId}`;
        const details = document.createElement("span");
        details.textContent = `${new Date(record.submittedAt).toLocaleString("zh-CN")} · 用时 ${EnglishTestReport.formatClock(record.elapsedMs)}`;
        copy.append(title, details);

        const actions = document.createElement("div");
        actions.className = "submission-actions";

        const downloadButton = document.createElement("button");
        downloadButton.type = "button";
        downloadButton.className = "primary-btn submission-download";
        downloadButton.textContent = "下载 Excel";
        downloadButton.addEventListener("click", async () => {
          if (downloadButton.disabled) return;
          downloadButton.disabled = true;
          try {
            downloadButton.textContent = "正在生成…";
            await EnglishTestReport.downloadExcel(record);
            downloadButton.textContent = "已下载";
          } catch (error) {
            console.error("Excel 生成失败。", error);
            alert(error.message || "Excel 生成失败，请刷新页面后再试。");
            downloadButton.textContent = "下载 Excel";
          } finally {
            downloadButton.disabled = false;
          }
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "submission-delete";
        deleteButton.textContent = "删除作业";
        deleteButton.addEventListener("click", async () => {
          if (deleteButton.disabled) return;
          const lessonName = record.lessonTitle || `Lesson ${record.lessonId}`;
          if (!confirm(`确定删除“${lessonName}”这份作业吗？\n\n删除后将无法恢复。`)) return;

          downloadButton.disabled = true;
          deleteButton.disabled = true;
          deleteButton.textContent = "删除中…";

          try {
            await deleteSubmissionRecord(record.id, child.id);
            card.remove();
            if (!list.children.length) {
              list.classList.add("hidden");
              empty.classList.remove("hidden");
            }
          } catch (error) {
            console.error("作业删除失败。", error);
            alert(error.message || "作业删除失败，请检查网络后再试。");
            downloadButton.disabled = false;
            deleteButton.disabled = false;
            deleteButton.textContent = "删除作业";
          }
        });

        actions.append(downloadButton, deleteButton);
        card.append(copy, actions);
        list.appendChild(card);
      });
    })();
  </script>
</body>
</html>
