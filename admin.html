<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>英语题库管理后台</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">E</div>
        <div><strong>英语题库后台</strong><small>管理员专用</small></div>
      </div>

      <button id="importBtn" class="import-btn">＋ 上传 TXT 文件</button>
      <input id="txtInput" type="file" accept=".txt,text/plain" hidden>

      <div class="side-title">课程目录</div>
      <nav id="lessonList" class="lesson-list"></nav>
      <button id="newLessonBtn" class="side-action">＋ 新建课程</button>

      <div class="side-title side-title-bottom">其他</div>
      <button class="side-link active-muted">最近导入</button>
      <button class="side-link">未分类</button>
      <button class="side-link">回收站</button>

      <a class="student-link" href="index.html">打开孩子答题页面 ↗</a>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <button id="menuBtn" class="menu-btn" aria-label="打开目录">☰</button>
        <div>
          <div class="eyebrow">题库管理 / <span id="breadcrumbLesson">Lesson 1</span></div>
          <h1 id="lessonTitle">Lesson 1 <small style="font-size:14px;color:#18794e">中文补全版 V2</small></h1>
          <p>英文和中文并排显示，像 Word 文档一样按章节查看、查找和修改。</p>
        </div>
        <div class="head-actions">
          <button id="fillChineseBtn" class="btn secondary accent">自动补中文</button>
          <button id="exportBtn" class="btn secondary">导出 TXT</button>
          <button id="saveBtn" class="btn primary">保存修改</button>
        </div>
      </header>

      <section style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px;padding:14px 16px;border:2px solid #8fd5b2;background:#f2fbf6;border-radius:14px;flex-wrap:wrap">
        <div><strong style="display:block;font-size:17px;color:#18794e">中文自动补全</strong><span style="color:#667789;font-size:13px">点击右侧按钮，为当前题库中尚未填写中文的内容自动补上中文。</span></div>
        <button id="fillChineseBtnBanner" class="btn primary" type="button">一键自动补中文</button>
      </section>

      <section class="search-row">
        <div class="search-box">⌕<input id="searchInput" placeholder="搜索英文、题号或分类……"></div>
        <select id="filterSelect" aria-label="筛选分类">
          <option value="all">全部分类</option>
          <option value="words">只看单词</option>
          <option value="phrases">只看短语</option>
          <option value="sentences">只看句子</option>
        </select>
      </section>

      <section class="summary-cards">
        <button class="summary active" data-jump="words"><span>单词</span><strong id="wordCount">0</strong><small>点击跳转</small></button>
        <button class="summary" data-jump="phrases"><span>短语</span><strong id="phraseCount">0</strong><small>点击跳转</small></button>
        <button class="summary" data-jump="sentences"><span>句子</span><strong id="sentenceCount">0</strong><small>点击跳转</small></button>
        <div class="summary total"><span>总题数</span><strong id="totalCount">0</strong><small id="saveState">本机演示数据</small></div>
      </section>

      <section id="documentArea" class="document-area"></section>
    </main>
  </div>

  <dialog id="importDialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-head">
        <div><h2>TXT 导入预览</h2><p>系统已经按词数自动分类，确认后才会放入题库。</p></div>
        <button value="cancel" class="icon-btn">×</button>
      </div>
      <div class="import-meta">
        <label>导入到
          <select id="importLesson"></select>
        </label>
        <span id="importStats"></span>
      </div>
      <div class="preview-column-head"><span>序号</span><span>分类</span><span>英文</span><span>中文</span></div>
      <div id="importPreview" class="import-preview"></div>
      <div class="dialog-actions">
        <button value="cancel" class="btn secondary">取消</button>
        <button id="confirmImportBtn" type="button" class="btn primary">确认导入</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>
  <script src="data.js"></script>
  <script src="translations.js"></script>
  <script src="admin.js"></script>
</body>
</html>
