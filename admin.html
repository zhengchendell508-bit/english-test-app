<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>家长题库管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
  <header class="admin-topbar">
    <a href="parent.html" class="back-btn" aria-label="返回">‹</a>
    <div class="admin-title">
      <h1>题库管理</h1>
      <p>家长可以在这里上传、检查和修改每一课的题目</p>
    </div>

    <div class="admin-top-actions">
      <label class="upload-btn">
        上传 TXT
        <input id="txtFile" type="file" accept=".txt,text/plain" hidden>
      </label>
      <button id="addLessonBtn" class="ghost-btn">新增 Lesson</button>
      <button id="saveBankBtn" class="primary-btn">保存题库</button>
    </div>
  </header>

  <main class="admin-shell">
    <aside class="lesson-sidebar panel">
      <div class="sidebar-heading">
        <h2>课程目录</h2>
        <span id="lessonCount">0 Lessons</span>
      </div>
      <div id="lessonList" class="lesson-list"></div>
    </aside>

    <section class="admin-workspace">
      <div class="panel lesson-summary">
        <div>
          <label for="lessonTitleInput">当前课程</label>
          <input id="lessonTitleInput" class="lesson-title-input" value="Lesson 1">
        </div>

        <div class="summary-counts">
          <span class="summary-word">单词 <strong id="wordsCount">0 / 30</strong></span>
          <span class="summary-phrase">短语 <strong id="phrasesCount">0 / 30</strong></span>
          <span class="summary-sentence">句子 <strong id="sentencesCount">0 / 30</strong></span>
        </div>
      </div>

      <section class="panel import-panel">
        <div>
          <h2>快速导入</h2>
          <p>一行一题。可以只写英文，也可以使用“英文 | 中文”。系统会自动分类。</p>
        </div>
        <div class="import-actions">
          <button id="openPasteBtn" class="ghost-btn">粘贴文字</button>
          <button id="autoChineseBtn" class="ghost-btn">自动补中文</button>
        </div>
      </section>

      <nav class="admin-tabs" aria-label="题库分类">
        <button class="admin-tab active" data-type="words">单词 <span id="wordsTabCount">30</span></button>
        <button class="admin-tab" data-type="phrases">短语 <span id="phrasesTabCount">30</span></button>
        <button class="admin-tab" data-type="sentences">句子 <span id="sentencesTabCount">30</span></button>
      </nav>

      <section class="panel table-panel">
        <div class="table-toolbar">
          <div>
            <h2 id="tableTitle">单词（30题）</h2>
            <p id="tableHint">孩子看到中文，并输入英文；也可以将题目设为听音题。</p>
          </div>
          <button id="clearSectionBtn" class="danger-outline">清空本部分</button>
        </div>

        <div class="bank-table-wrap">
          <table class="bank-table">
            <thead>
              <tr>
                <th class="number-col">编号</th>
                <th>中文提示</th>
                <th>英文答案</th>
                <th class="mode-col">出题方式</th>
                <th class="audio-col">播放</th>
              </tr>
            </thead>
            <tbody id="bankRows"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <dialog id="pasteDialog" class="admin-dialog">
    <form method="dialog">
      <h2>粘贴题目</h2>
      <p>每行一题。示例：<b>apple | 苹果</b></p>
      <textarea id="pasteText" rows="12" placeholder="apple | 苹果&#10;good morning | 早上好&#10;How are you today? | 你今天怎么样？"></textarea>
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">取消</button>
        <button id="importTextBtn" type="button" class="primary-btn">自动分类并导入</button>
      </div>
    </form>
  </dialog>

  <dialog id="messageDialog" class="admin-dialog">
    <form method="dialog">
      <h2 id="messageTitle">提示</h2>
      <div id="messageBody" class="message-body"></div>
      <div class="dialog-actions">
        <button value="close" class="primary-btn">知道了</button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
