<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>家长中心</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="simple-shell">
    <header class="simple-header">
      <a href="index.html" class="back-btn">‹</a>
      <div><h1>家长中心</h1><p>先创建孩子，孩子入口才会显示名字</p></div>
    </header>

    <section class="panel">
      <h2>创建孩子</h2>
      <p class="muted">只填写孩子名字，不需要密码。</p>
      <div class="create-row">
        <input id="childName" maxlength="30" placeholder="请输入孩子名字">
        <button id="createBtn" class="primary-btn">创建孩子</button>
      </div>
      <div id="parentMessage" class="notice hidden"></div>
    </section>

    <section class="panel">
      <h2>家长功能</h2>
      <div class="parent-menu">
        <a href="children.html?manage=1">👧 管理孩子</a>
        <a href="admin.html">🗂️ 管理题库</a>
      </div>
    </section>
  </main>
  <script src="account.js"></script>
  <script>
    const input = document.getElementById("childName");
    const msg = document.getElementById("parentMessage");
    function submit(){
      try{
        const child = createChild(input.value);
        setActiveChild(child);
        location.href = "student.html";
      }catch(e){
        msg.textContent = e.message;
        msg.classList.remove("hidden");
      }
    }
    document.getElementById("createBtn").onclick = submit;
    input.addEventListener("keydown", e => { if(e.key === "Enter") submit(); });
  </script>
</body>
</html>
