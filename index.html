<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fc">
  <title>英语学习系统</title>
  <link rel="stylesheet" href="style.css?v=20260719-children-cloud-1">
  <script src="device-mode.js?v=20260719-children-cloud-1"></script>
</head>
<body class="entry-body">
  <main class="entry-shell">
    <header class="entry-title">
      <div class="app-logo">📘</div>
      <div>
        <h1>英语学习系统</h1>
        <p>请选择使用身份</p>
      </div>
    </header>

    <section class="role-grid">
      <a id="parentRoleCard" class="role-card parent-role desktop-management-only" href="parent.html">
        <span class="role-icon">👨‍👩‍👧‍👦</span>
        <span>
          <strong>家长</strong>
          <small>创建孩子、管理题库、查看学习记录</small>
        </span>
        <b>›</b>
      </a>

      <a class="role-card child-role" href="children.html">
        <span class="role-icon">🧒</span>
        <span>
          <strong>孩子</strong>
          <small>选择自己的名字，然后进入测试</small>
        </span>
        <b>›</b>
      </a>
    </section>
  </main>
  <script>
    if (window.AppDeviceMode?.isStudentOnlyDevice) {
      const subtitle = document.querySelector(".entry-title p");
      if (subtitle) subtitle.textContent = "请选择孩子进入英语测试";
    }
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
  </script>
</body>
</html>
