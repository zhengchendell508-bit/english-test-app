<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24415f">
  <title>英语学习系统入口</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f3f6f9;color:#17212b;display:grid;place-items:center;padding:24px}.wrap{width:min(760px,100%)}h1{font-size:30px;margin:0 0 8px}.sub{color:#667789;margin:0 0 24px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #d5dde5;border-radius:18px;padding:26px;box-shadow:0 10px 30px rgba(36,65,95,.08);transition:.15s transform,.15s box-shadow}.card:hover{transform:translateY(-2px);box-shadow:0 15px 36px rgba(36,65,95,.13)}.icon{font-size:42px}.card h2{margin:14px 0 8px;font-size:22px}.card p{margin:0;color:#667789;line-height:1.6}.student{border-top:6px solid #24415f}.admin{border-top:6px solid #18794e}.note{margin-top:18px;background:#fff7e6;border:1px solid #f0d29c;border-radius:12px;padding:14px;color:#72510d;line-height:1.6}@media(max-width:650px){.cards{grid-template-columns:1fr}h1{font-size:24px}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>英语学习系统</h1>
    <p class="sub">请选择要打开的页面。</p>
    <section class="cards">
      <a class="card student" href="student.html">
        <div class="icon">✍️</div>
        <h2>孩子答题页面</h2>
        <p>进入单词、短语和句子的听写答题页面。</p>
      </a>
      <a class="card admin" href="admin.html">
        <div class="icon">🗂️</div>
        <h2>题库管理后台</h2>
        <p>查看 Lesson、上传 TXT、搜索、分类、修改和试听内容。</p>
      </a>
    </section>
    <div class="note">这是演示版入口。正式版后台会增加登录保护，孩子无法进入。</div>
  </main>
</body>
</html>
