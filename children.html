<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>选择孩子</title>
  <link rel="stylesheet" href="style.css?v=20260720-hint-buttons-v12">
  <script src="device-mode.js?v=20260720-hint-buttons-v12"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <main class="simple-shell">
    <header class="simple-header">
      <a href="index.html" class="back-btn">‹</a>
      <div><h1>选择孩子</h1><p>点击自己的名字进入测试</p></div>
    </header>
    <section class="panel">
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-emoji">👨‍👩‍👧</div>
        <h2>还没有创建孩子</h2>
        <p>请先由家长创建孩子。</p>
        <a id="createChildLink" class="primary-btn inline-btn desktop-management-only" href="parent.html">进入家长页面创建</a>
        <p class="mobile-computer-note">请在电脑端创建孩子并同步后，再回到这里选择。</p>
      </div>
      <div id="childrenState" class="hidden">
        <h2>请选择孩子</h2>
        <div id="childrenList" class="children-list"></div>
      </div>
    </section>
  </main>
  <script src="account.js?v=20260720-hint-buttons-v12"></script>
  <script>
    (async () => {
      const manage =
        !window.AppDeviceMode?.isStudentOnlyDevice &&
        new URLSearchParams(location.search).get("manage") === "1";

      const empty = document.getElementById("emptyState");
      const state = document.getElementById("childrenState");
      const list = document.getElementById("childrenList");

      state.classList.remove("hidden");
      state.querySelector("h2").textContent = "正在同步孩子名单…";

      const children = await loadChildren();

      state.classList.add("hidden");
      list.innerHTML = "";

      if (!children.length) {
        empty.classList.remove("hidden");
        return;
      }

      state.classList.remove("hidden");
      state.querySelector("h2").textContent = manage ? "管理孩子" : "请选择孩子";

      children.forEach(child => {
        const item = document.createElement("div");
        item.className = "child-choice";
        const first = child.name.slice(0, 1).toUpperCase();

        item.innerHTML = `
          <span class="avatar">${first}</span>
          <span class="child-copy"><strong></strong><small>${manage ? "可以删除此孩子" : "选择后进入测试"}</small></span>
          ${manage ? '<button class="delete-child">删除</button>' : '<b class="choice-arrow">›</b>'}
        `;

        item.querySelector("strong").textContent = child.name;

        if (manage) {
          item.querySelector(".delete-child").onclick = async event => {
            event.stopPropagation();
            if (!confirm(`确定删除“${child.name}”吗？`)) return;

            const button = event.currentTarget;
            button.disabled = true;
            button.textContent = "删除中…";

            try {
              await removeChild(child.id);
              location.reload();
            } catch (error) {
              alert(error.message);
              button.disabled = false;
              button.textContent = "删除";
            }
          };
        } else {
          item.onclick = () => {
            setActiveChild(child);
            location.href = "student.html";
          };
        }

        list.appendChild(item);
      });
    })();
  </script>
</body>
</html>
