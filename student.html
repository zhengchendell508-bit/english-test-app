<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24415f">
  <title>新概念英语答题 App</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body class="student-locked">
  <header class="topbar">
    <div>
      <h1>新概念英语答题 App</h1>
      <p>孩子独立账号 · 答案实时自动保存</p>
    </div>
    <div class="top-actions">
      <a class="ghost-link" href="admin.html">管理后台</a>
      <button id="settingsBtn" class="ghost-btn" disabled>设置</button>
    </div>
  </header>

  <main>
    <section id="studentSessionCard" class="student-card hidden">
      <div class="student-identity">
        <span class="field-label">当前孩子</span>
        <strong id="activeStudentName">—</strong>
      </div>
      <div class="student-identity">
        <span class="field-label">本次开始时间（系统自动记录）</span>
        <strong id="startTimeText">—</strong>
      </div>
      <div class="student-session-actions">
        <span class="save-status" id="saveStatus">已自动保存</span>
        <button id="switchStudentBtn" class="ghost-btn" type="button">切换孩子</button>
      </div>
    </section>

    <div id="examContent" class="hidden">
      <nav class="tabs" aria-label="题目部分">
        <button class="tab active" data-section="words">单词 <span>0</span></button>
        <button class="tab" data-section="phrases">短语 <span>0</span></button>
        <button class="tab" data-section="sentences">句子 <span>0</span></button>
      </nav>

      <section class="toolbar">
        <div>
          <strong id="sectionTitle">第一部分：单词</strong>
          <span id="progressText">已填写 0 / 0</span>
        </div>
        <div class="toolbar-actions">
          <button id="jumpBtn" class="ghost-btn" type="button">跳到题号</button>
          <button id="gradeBtn" class="primary-btn" type="button">提交批改</button>
        </div>
      </section>

      <section id="resultPanel" class="result-panel hidden"></section>
      <section id="questions" class="questions words-grid"></section>
    </div>
  </main>

  <dialog id="studentLoginDialog" class="login-dialog">
    <section class="account-card">
      <div class="login-mark">E</div>
      <h2>选择或创建孩子账号</h2>
      <p class="account-intro">每个孩子的答案、进度和提交记录会分别保存，互不影响。</p>

      <div class="account-tabs" role="tablist" aria-label="孩子账号操作">
        <button id="existingAccountTab" class="account-tab active" type="button" role="tab">选择已有孩子</button>
        <button id="createAccountTab" class="account-tab" type="button" role="tab">创建新孩子</button>
      </div>

      <section id="existingAccountPanel" class="account-panel">
        <div id="studentAccountList" class="student-account-list"></div>
        <div id="noStudentAccounts" class="no-accounts hidden">还没有孩子账号，请点击“创建新孩子”。</div>
      </section>

      <form id="createStudentForm" class="account-panel hidden">
        <label for="newStudentName">孩子姓名</label>
        <input id="newStudentName" type="text" maxlength="40" autocomplete="name" placeholder="请输入孩子的名字">
        <div id="createStudentError" class="login-error" aria-live="polite"></div>
        <button class="primary-btn login-confirm" type="submit">创建并登录</button>
      </form>

      <small>不需要密码。创建后会直接进入测试页面，填写内容将实时自动保存。</small>
    </section>
  </dialog>

  <dialog id="settingsDialog">
    <form method="dialog">
      <h2>设置</h2>
      <label class="switch-row">
        <span>显示正确答案按钮</span>
        <input id="allowReveal" type="checkbox">
      </label>
      <label class="switch-row">
        <span>忽略大小写和标点</span>
        <input id="lenientMode" type="checkbox" checked>
      </label>
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">关闭</button>
        <button id="resetBtn" value="cancel" class="danger-btn" type="button">清空当前孩子答案</button>
      </div>
    </form>
  </dialog>

  <dialog id="jumpDialog">
    <form method="dialog">
      <h2>跳到题号</h2>
      <input id="jumpInput" type="number" min="1" inputmode="numeric" placeholder="输入题号">
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">取消</button>
        <button id="jumpConfirm" value="cancel" class="primary-btn" type="button">跳转</button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
