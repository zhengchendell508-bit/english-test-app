<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24415f">
  <title>新概念英语答题 App</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>新概念英语答题 App</h1>
      <p>Lesson 1–10 · iPad 版</p>
    </div>
    <div class="top-actions"><a class="ghost-link" href="admin.html">管理后台</a><button id="settingsBtn" class="ghost-btn">设置</button></div>
  </header>

  <main>
    <section class="student-card">
      <label>姓名<input id="studentName" autocomplete="name" placeholder="请输入姓名"></label>
      <label>日期<input id="testDate" type="date"></label>
      <div class="save-status" id="saveStatus">已自动保存</div>
    </section>

    <nav class="tabs" aria-label="题目部分">
      <button class="tab active" data-section="words">单词 <span>150</span></button>
      <button class="tab" data-section="phrases">短语 <span>200</span></button>
      <button class="tab" data-section="sentences">句子 <span>200</span></button>
    </nav>

    <section class="toolbar">
      <div>
        <strong id="sectionTitle">第一部分：单词</strong>
        <span id="progressText">已填写 0 / 150</span>
      </div>
      <div class="toolbar-actions">
        <button id="jumpBtn" class="ghost-btn">跳到题号</button>
        <button id="gradeBtn" class="primary-btn">提交批改</button>
      </div>
    </section>

    <section id="resultPanel" class="result-panel hidden"></section>
    <section id="questions" class="questions words-grid"></section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog">
      <h2>设置</h2>
      <label class="switch-row">
        <span>显示正确答案按钮</span>
        <input id="allowReveal" type="checkbox">
      </label>
      <label class="switch-row">
        <span>忽略大小写和标点</span>
        <input id="lenientMode" type="checkbox" checked>
      </label>
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">关闭</button>
        <button id="resetBtn" value="cancel" class="danger-btn" type="button">清空全部答案</button>
      </div>
    </form>
  </dialog>

  <dialog id="jumpDialog">
    <form method="dialog">
      <h2>跳到题号</h2>
      <input id="jumpInput" type="number" min="1" inputmode="numeric" placeholder="输入题号">
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">取消</button>
        <button id="jumpConfirm" value="cancel" class="primary-btn" type="button">跳转</button>
      </div>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
